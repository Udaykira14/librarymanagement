<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<link rel="stylesheet" href="Login.css">

</head>
<body>
	<main align="center">
		<form action="login" method="get">
			<fieldset>
				<legend>Login</legend>
				<br>
				<div>
					<label for="Email">Email</label> : <input type="email" id="Email"
						name="email" value="audi@gmail.com" required><br>
				</div>
				<div>
					<label for="Password">Password</label> : <input id="Password"
						type="password" name="password" value="audi@123" required><br>
				</div>
				<div>
					Role : <label for="user">User</label> <input type="radio"
						name="role" value="user" id="user" required checked> <label
						for="Admin">Admin</label> <input id="Admin" type="radio" 
						name="role" value="admin">
				</div>
				<br>
				<button>Login</button>
			</fieldset>
		</form>
		<a href='SignUp.html'><button>SignUp</button></a>
	</main>
</body>
</html>
